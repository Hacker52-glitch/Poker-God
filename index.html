const SUITS = ["♠", "♥", "♦", "♣"];

const RANK_S = { 11:"J",12:"Q",13:"K",14:"A" };
const rs = (r) => RANK_S[r] || String(r);

function makeDeck() { const d = []; for (let r = 2; r <= 14; r++) for (let s = 0; s < 4; s++) d.push({ r, s }); return d; }

function shuffled() { const d = makeDeck(); for (let i = d.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [d[i], d[j]] = [d[j], d[i]]; } return d; }

function straightHigh(rankArr) {

  for (let i = 1; i < sorted.length; i++) { if (sorted[i] === sorted[i - 1] - 1) { run++; if (run >= 5) return sorted[i - 4]; } else run = 1; }

}
function evaluate7(cards) {

  if (fs >= 0) { const sf = straightHigh(sg[fs]); if (sf) return [8, sf]; }

  const g = Object.keys(counts).map((r) => [+r, counts[r]]).sort((a, b) => b[1] - a[1] || b[0] - a[0]);
  if (g[0][1] === 4) return [7, g[0][0], Math.max(...ranks.filter((r) => r !== g[0][0]))];
  if (g[0][1] === 3 && g[1] && g[1][1] >= 2) return [6, g[0][0], g[1][0]];

function describe(score) {

  if (c === 8) return score[1] === 14 ? "Royal Flush 👑" : `Straight Flush, ${RANK_W[score[1] === 1 ? 5 : score[1]]}-high`;
  if (c === 7) return `Four ${plural(RANK_W[score[1]])} 🤯`;
  if (c === 6) return `${plural(RANK_W[score[1]])} full of ${plural(RANK_W[score[2]])}`;
  if (c === 5) return `Flush, ${RANK_W[score[1]]}-high`;
  if (c === 4) return `Straight, ${RANK_W[score[1] === 1 ? 5 : score[1]]}-high`;
  if (c === 3) return `Trip ${plural(RANK_W[score[1]])}`;
  if (c === 2) return `Two Pair, ${plural(RANK_W[score[1]])} & ${plural(RANK_W[score[2]])}`;

}
function bestIdxOf(hands, board) {

}
function computeEquity(hands, board, iters) {

// hero share vs a field of known opponents, given a partial board
function eqVsField(hero, opps, board) {

  const need = 5 - board.length;

    let best = null, idxs = [];
    for (let h = 0; h < hands.length; h++) { const sc = evaluate7([...hands[h], ...b]); if (best === null || cmp(sc, best) > 0) { best = sc; idxs = [h]; } else if (cmp(sc, best) === 0) idxs.push(h); }
    return idxs.includes(0) ? 1 / idxs.length : 0;

  if (need === 1) { for (let i = 0; i < rem.length; i++) { s += trial([...board, rem[i]]); n++; } }

}
const RANGES = [
  { name: "Any Pocket Pair", test: (a, b) => a.r === b.r },
  { name: "Any Ace", test: (a, b) => a.r === 14 || b.r === 14 },
  { name: "Broadway (T+)", test: (a, b) => a.r >= 10 && b.r >= 10 },
  { name: "Suited Connectors", test: (a, b) => a.s === b.s && Math.abs(a.r - b.r) === 1 },
  { name: "Any Two Suited", test: (a, b) => a.s === b.s },
  { name: "Premiums (JJ+, AK, AQ)", test: (a, b) => (a.r === b.r && a.r >= 11) || ([a.r, b.r].includes(14) && ([a.r, b.r].includes(13) || [a.r, b.r].includes(12))) },
  { name: "Total Wildcard 🃏", test: () => true },
];
const RPRIORITY = ["Any Pocket Pair", "Premiums (JJ+, AK, AQ)", "Suited Connectors", "Broadway (T+)", "Any Ace", "Any Two Suited"];
function rangeLabel(a, b) { for (const nm of RPRIORITY) { const rg = RANGES.find((r) => r.name === nm); if (rg && rg.test(a, b)) return nm; } return "Any two cards"; }
function computeRangeEquity(hero, board, test, iters) {
  const used = new Set([...hero, ...board].map(key));

  const combos = [];
  for (let i = 0; i < rem.length; i++) for (let j = i + 1; j < rem.length; j++) if (test(rem[i], rem[j])) combos.push([rem[i], rem[j]]);
  if (!combos.length) return null;

  for (let it = 0; it < iters; it++) {
    const opp = combos[Math.floor(Math.random() * combos.length)];
    const os = new Set(opp.map(key)); const pool = rem.filter((c) => !os.has(key(c)));

}
function streetName(n) { return n === 0 ? "preflop" : n === 3 ? "flop" : "turn"; }
function randStreet() { const r = Math.random(); return r < 0.2 ? 0 : r < 0.6 ? 3 : 4; }
function deal(mode, players, diff) {
  if (mode === "range") return dealRange(diff);
  const ITERS = 2800;
  for (let a = 0; a < 60; a++) {
    const deck = shuffled(); let p = 0; const hands = [];
    for (let h = 0; h < players; h++) hands.push([deck[p++], deck[p++]]);

      const cats = r.scores.map((s) => s[0]).sort((x, y) => y - x); let ok = true;
      if (diff === "easy") ok = cats[0] > cats[1] && r.idx.length === 1; else if (diff === "hard") ok = cats[0] === cats[1];

// Draft & Sweat — hidden board, multi-way capable
function dealDraft(diff, players) {

  for (let k = 0; k < np - 1; k++) { opps.push([deck[p++], deck[p++]]); }

function ComboMeter({ streak }) {
  const tier = streak >= 9 ? { n: "INFERNO 🔥🔥🔥", g: "linear-gradient(90deg,#f59e0b,#ef4444,#f43f5e)" }
    : streak >= 6 ? { n: "BLAZING 🔥🔥", g: "linear-gradient(90deg,#fbbf24,#fb923c)" }
    : streak >= 3 ? { n: "HOT 🔥", g: "linear-gradient(90deg,#fde047,#fbbf24)" }
    : streak >= 1 ? { n: "Warming up…", g: "linear-gradient(90deg,#fde68a,#fcd34d)" }
    : { n: "Build a streak!", g: "#3f3f46" };
  const fill = Math.min(streak, 9) / 9 * 100;
  return (
    <div className="bg-black/50 rounded-full px-3 py-1.5 flex items-center gap-2 border border-amber-500/25">
      <span className="text-white text-[11px] font-black whitespace-nowrap w-28 shrink-0">{tier.n}</span>
      <div className="flex-1 h-3 bg-black/60 rounded-full overflow-hidden relative">
        <div className="h-full rounded-full transition-all duration-500" style={{ width: fill + "%", background: tier.g }} />
        {streak > 0 && <span className="absolute top-1/2 -translate-y-1/2 text-xs" style={{ left: "calc(" + fill + "% - 10px)", transition: "left 0.5s" }}>🔥</span>}
      </div>
      <span className="text-amber-300 text-xs font-black w-6 text-right shrink-0">×{streak}</span>
    </div>
  );
}
function EquityBar({ eq, oppLabel }) {
  const hero = Math.round(eq * 100), opp = 100 - hero;
  return (
    <div className="max-w-xs mx-auto my-3">
      <div className="flex justify-between text-[11px] font-black mb-1"><span className="text-amber-300">YOU {hero}%</span><span className="text-rose-300">{oppLabel || "OPP"} {opp}%</span></div>
      <div className="h-4 rounded-full overflow-hidden flex bg-black/60 border border-amber-500/30" style={{ boxShadow: "inset 0 1px 3px rgba(0,0,0,0.6)" }}>
        <div className="h-full transition-all duration-300" style={{ width: hero + "%", background: "linear-gradient(90deg,#fde68a,#e9c45a)" }} />
        <div className="h-full transition-all duration-300" style={{ width: opp + "%", background: "linear-gradient(90deg,#9f1239,#e11d48)" }} />
      </div>
    </div>
  );
}

const BG = { backgroundColor: "#05130d", backgroundImage: "radial-gradient(circle at 50% 50%, transparent 50%, rgba(0,0,0,.62) 100%), radial-gradient(circle at 50% 18%, rgba(201,162,58,.12), rgba(201,162,58,0) 42%), radial-gradient(ellipse at 50% 30%, #114a35, #0a2c20 48%, #06140d 82%)" };
const BG_HOME = { backgroundColor: "#070605", backgroundImage: "radial-gradient(circle at 50% -8%, rgba(212,175,55,.24), rgba(212,175,55,0) 46%), radial-gradient(circle at 50% 118%, rgba(201,162,58,.13), transparent 55%), linear-gradient(180deg,#0d0a07,#050403)" };
const PANEL = "panel rounded-3xl";
const Avatar = ({ skin, mood, name, size }) => (
  <div className="flex flex-col items-center shrink-0">
    <span className={size || "text-5xl"} style={{ animation: "bob 2.5s ease-in-out infinite" }}>{skin.f[mood] || skin.f.idle}</span>
    {name && <span className="text-amber-300 text-[11px] font-black -mt-0.5 max-w-[80px] truncate">{name}</span>}

);

function App() {
  const [screen, setScreen] = useState("boot");
  const [mode, setMode] = useState("showdown");
  const [players, setPlayers] = useState(2);
  const [diff, setDiff] = useState("medium");
  const [blitz, setBlitz] = useState(false);
  const [muted, setMuted] = useState(false);
  const [round, setRound] = useState(null);
  const [pickv, setPickv] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [stats, setStats] = useState({ score: 0, streak: 0, best: 0, correct: 0, total: 0 });
  const [timeLeft, setTimeLeft] = useState(60);
  const [popc, setPopc] = useState(0);
  const [shake, setShake] = useState(false);
  const [mood, setMood] = useState("idle");
  const [msg, setMsg] = useState("Let's gamble! 🎲");
  const [xp, setXp] = useState(0);
  const [skin, setSkin] = useState(0);
  const [loaded, setLoaded] = useState(false);
  const [floatPts, setFloatPts] = useState(null);
  const [unlock, setUnlock] = useState(null);
  const [shieldUsed, setShieldUsed] = useState(false);
  const [name, setName] = useState("");
  const [nameInput, setNameInput] = useState("");
  const [note, setNote] = useState("");
  const [draftSel, setDraftSel] = useState([]);
  const [boardShown, setBoardShown] = useState(0);
  const [sweating, setSweating] = useState(false);
  const [liveEq, setLiveEq] = useState(null);

  useEffect(() => {
    const p = loadProfile();
    if (p) { setXp(p.xp || 0); setSkin(p.skin || 0); if (p.name) setName(p.name); }
    setLoaded(true);
    setScreen(p && p.name ? "menu" : "login");
    try { if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices(); } catch (e) {}
  }, []);
  useEffect(() => { if (!loaded) return; const t = setTimeout(() => saveProfile({ xp, skin, name }), 600); return () => clearTimeout(t); }, [xp, skin, name, loaded]);
  useEffect(() => {
    if (screen !== "play" || !blitz) return;
    if (timeLeft <= 0) { setScreen("over"); return; }
    const t = setTimeout(() => setTimeLeft((x) => x - 1), 1000);
    return () => clearTimeout(t);
  }, [screen, blitz, timeLeft]);

  const curSkin = SKINS.find((s) => s.id === skin) || SKINS[0];
  const who = (i) => (i === 0 ? (name || "You") : POS[i]);
  const say = (m, mood2) => { setMsg(m); if (mood2) setMood(mood2); speak(m, muted, curSkin.pitch); };
  const freshRound = useCallback((m, p, d) => {
    setDraftSel([]); setBoardShown(0); setSweating(false); setLiveEq(null);
    if (m === "draft") { setRound(dealDraft(d, p)); setPickv(null); setRevealed(false); setMood("idle"); setMsg("Draft 2 cards… read the field 🃏"); return; }
    setRound(deal(m, p, d)); setPickv(null); setRevealed(false); setMood("idle"); setMsg(pick(Q.ask[m]));
  }, []);
  const nextRound = useCallback(() => freshRound(mode, players, diff), [mode, players, diff, freshRound]);
  const start = () => { primeSpeech(); setStats({ score: 0, streak: 0, best: 0, correct: 0, total: 0 }); setTimeLeft(60); setShieldUsed(false); freshRound(mode, players, diff); setScreen("play"); };
  const confirmName = () => { primeSpeech(); const v = nameInput.trim().slice(0, 16); if (!v) return; ping("click", muted); setName(v); saveProfile({ xp, skin, name: v }); setScreen("menu"); };
  const notify = (m) => { setNote(m); setTimeout(() => setNote(""), 1900); };
  const shareGame = async () => { const url = window.location.href; const text = "I'm playing POKER GOD 🃏 — think you can out-read me? Try it free:"; try { if (navigator.share) await navigator.share({ title: "POKER GOD", text, url }); else { await navigator.clipboard.writeText(url); notify("Link copied! 📋"); } } catch (e) { try { await navigator.clipboard.writeText(url); notify("Link copied! 📋"); } catch (e2) {} } };
  const shareScore = async () => { const url = window.location.href; const text = "I just scored " + stats.score + " in POKER GOD 🃏 (" + (stats.total ? Math.round(stats.correct / stats.total * 100) : 0) + "% reads). Bet you can't beat me 😏"; try { if (navigator.share) await navigator.share({ title: "POKER GOD", text, url }); else { await navigator.clipboard.writeText(text + " " + url); notify("Score copied! 📋"); } } catch (e) { try { await navigator.clipboard.writeText(text + " " + url); notify("Score copied! 📋"); } catch (e2) {} } };

  const toggleDraft = (i) => {
    if (sweating || revealed) return;
    primeSpeech(); ping("click", muted);
    setDraftSel((sel) => {
      if (sel.includes(i)) return sel.filter((x) => x !== i);
      if (sel.length < 2) return [...sel, i];
      return [sel[1], i];
    });
  };
  const lockDraft = () => {
    if (draftSel.length !== 2 || sweating || revealed) return;
    primeSpeech();
    const hero = [round.pool[draftSel[0]], round.pool[draftSel[1]]];
    setSweating(true); setMsg("Locked in. Run it! 🔥"); ping("lock", muted);
    setBoardShown(0);
    setLiveEq(eqVsField(hero, round.opps, []));
    let nn = 0;
    const step = () => {
      if (nn < 5) { nn++; setBoardShown(nn); setLiveEq(eqVsField(hero, round.opps, round.fullBoard.slice(0, nn))); ping("card", muted, nn); setTimeout(step, 820); }
      else { setTimeout(() => resolveDraft(hero), 750); }
    };
    setTimeout(step, 650);
  };
  const resolveDraft = (hero) => {
    const all = [hero, ...round.opps];
    let best = null, idxs = [];
    for (let h = 0; h < all.length; h++) { const sc = evaluate7([...all[h], ...round.fullBoard]); if (best === null || cmp(sc, best) > 0) { best = sc; idxs = [h]; } else if (cmp(sc, best) === 0) idxs.push(h); }
    const heroIn = idxs.includes(0);
    const won = heroIn && idxs.length === 1, tie = heroIn && idxs.length > 1;
    const success = heroIn;
    const lo = Math.min(draftSel[0], draftSel[1]), hi = Math.max(draftSel[0], draftSel[1]);
    const mine = round.comboEq.find((c) => c.ij[0] === lo && c.ij[1] === hi);
    const myOutcome = mine ? mine.outcome : 0;
    const greatDraft = myOutcome >= 1 || (round.bestEq < 1 && myOutcome >= 0.5);
    const perk = curSkin.perk;
    let gain = Math.round((greatDraft ? 15 : 5) * MULT[diff]);
    if (success) gain += Math.round((10 + stats.streak * (perk === "streak" ? 8 : 5)) * MULT[diff]);
    if (perk === "brain" && diff === "hard") gain = Math.round(gain * 1.25);
    if (perk === "double" && Math.random() < 0.2) gain *= 2;
    const xpGain = perk === "hoard" ? Math.round(gain * 1.5) : gain;
    setRevealed(true); setSweating(false);
    setStats((s) => ({ score: s.score + gain, streak: success ? s.streak + 1 : 0, best: Math.max(s.best, success ? s.streak + 1 : s.streak), correct: s.correct + (success ? 1 : 0), total: s.total + 1 }));
    if (success) { ping(stats.streak + 1 >= 3 ? "great" : "good", muted); setPopc((k) => k + 1); say(tie ? "Chopped the pot! 🤝" : greatDraft ? "Perfect draft!" : "Scooped it! 💰", "wow"); }
    else { ping("bad", muted); setShake(true); setTimeout(() => setShake(false), 550); say(greatDraft ? "Great draft, cruel river." : "The field got there. Ouch.", "sad"); }
    setFloatPts({ k: Date.now(), text: "+" + gain, color: success ? "#fcd34d" : "#cbd5e1" });
    if (xpGain > 0) {
      const before = unlockedCount(xp), nx = xp + xpGain, after = unlockedCount(nx);
      setXp(nx);
      if (after > before) { const ns = SKINS[after - 1]; setUnlock(ns); setSkin(ns.id); setTimeout(() => ping("unlock", muted), 250); setTimeout(() => setUnlock(null), 3600); }
    }
    if (blitz) setTimeout(() => freshRound(mode, players, diff), 1900);
  };

  const submit = (choice) => {
    if (revealed) return;
    primeSpeech();
    setPickv(choice);
    const ok = mode === "range" ? choice === round.bucket : round.winners.includes(choice);
    const perk = curSkin.perk;
    const step = perk === "streak" ? 8 : 5;
    let gain = 0, xpGain = 0, saved = false, doubled = false;
    if (ok) {
      gain = Math.round((10 + stats.streak * step) * MULT[diff]);
      if (perk === "brain" && diff === "hard") gain = Math.round(gain * 1.25);
      if (perk === "double" && Math.random() < 0.2) { gain *= 2; doubled = true; }
      xpGain = perk === "hoard" ? Math.round(gain * 1.5) : gain;
    } else if (perk === "shield" && !shieldUsed) { saved = true; setShieldUsed(true); }
    else if (perk === "thick") { gain = 5; xpGain = 5; }
    const newStreak = ok ? stats.streak + 1 : saved ? stats.streak : 0;
    setRevealed(true);
    setStats((s) => ({ score: s.score + gain, streak: ok ? s.streak + 1 : saved ? s.streak : 0, best: Math.max(s.best, ok ? s.streak + 1 : s.streak), correct: s.correct + (ok ? 1 : 0), total: s.total + 1 }));
    if (ok) {
      const big = newStreak >= 3;
      ping(big ? "great" : "good", muted); setPopc((k) => k + 1);
      say(doubled ? "Double payout! 🍀💰" : big ? pick(Q.great) : pick(Q.good), big ? "wow" : "happy");
      setFloatPts({ k: Date.now(), text: "+" + gain + (doubled ? " 🍀" : ""), color: doubled ? "#86efac" : "#fcd34d" });
    } else if (saved) {
      ping("good", muted); say("Nine Lives! Streak saved!", "happy");
      setFloatPts({ k: Date.now(), text: "🛡️ SAVED", color: "#67e8f9" });
    } else {
      ping("bad", muted); setShake(true); setTimeout(() => setShake(false), 550);
      say(pick(Q.bad), "sad");
      if (gain > 0) setFloatPts({ k: Date.now(), text: "+" + gain, color: "#cbd5e1" });
    }
    if (xpGain > 0) {
      const before = unlockedCount(xp), nx = xp + xpGain, after = unlockedCount(nx);
      setXp(nx);
      if (after > before) { const ns = SKINS[after - 1]; setUnlock(ns); setSkin(ns.id); setTimeout(() => ping("unlock", muted), 250); setTimeout(() => setUnlock(null), 3600); }
    }
    if (blitz) setTimeout(() => freshRound(mode, players, diff), 1100);
  };

  const acc = stats.total ? Math.round((stats.correct / stats.total) * 100) : 0;
  const correct = revealed && mode !== "draft" && (mode === "range" ? pickv === round.bucket : (round && round.winners ? round.winners.includes(pickv) : false));
  const lvl = unlockedCount(xp);
  const nextSkin = SKINS.find((s) => s.xp > xp);

  if (screen === "boot") return (<div className="min-h-[640px] w-full flex items-center justify-center" style={BG_HOME}><style>{STYLE}</style><div className="text-amber-300 font-black text-xl animate-pulse">🃏 Shuffling the deck…</div></div>);

  if (screen === "login") return (
    <div className="min-h-[640px] w-full flex items-center justify-center p-4" style={BG_HOME}>
      <style>{STYLE}</style>
      <div className={PANEL + " p-7 max-w-sm w-full text-center"}>
        <span className="text-7xl inline-block glowemoji" style={{ animation: "bob 2.5s ease-in-out infinite" }}>{curSkin.f.idle}</span>
        <h1 className="text-5xl font-black text-white mt-3 leading-none tracking-tight">POKER<span className="gtxt"> GOD</span></h1>
        <p className="text-amber-200 text-[11px] mt-2 font-black uppercase tracking-[0.35em] mb-3">The Art of the Read</p>
        <div className="grule w-24 mx-auto mb-5"></div>
        <p className="text-white font-bold mb-3">{name ? "Change your name, legend?" : "What should we call you, legend?"}</p>
        <input value={nameInput} onChange={(e) => setNameInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") confirmName(); }}
          maxLength={16} placeholder="Your screen name"
          className="w-full text-center px-4 py-3 rounded-2xl font-black text-stone-900 text-lg outline-none bg-white mb-2 placeholder:text-stone-400" />
        <p className="text-white/50 text-[11px] mb-5">{nameInput.trim().length}/16 · you can change this anytime</p>
        <button onClick={confirmName} disabled={!nameInput.trim()}
          className={"w-full py-4 rounded-2xl font-black text-xl transition " + (nameInput.trim() ? "gbtn active:scale-95" : "bg-white/15 text-white/40")}>
          🎲 Enter the Table
        </button>
      </div>
    </div>
  );

  if (screen === "menu") {
    const idxN = SKINS.indexOf(nextSkin);
    const prevX = nextSkin ? (idxN > 0 ? SKINS[idxN - 1].xp : 0) : SKINS[SKINS.length - 1].xp;
    const prog = nextSkin ? Math.max(0, Math.min(100, ((xp - prevX) / (nextSkin.xp - prevX)) * 100)) : 100;
    const Opt = ({ active, onClick, emoji, title, sub }) => (
      <button onClick={() => { ping("click", muted); onClick(); }}
        className={"text-left p-3 rounded-2xl border-2 transition active:scale-95 " + (active ? "gsel shadow-lg scale-[1.02]" : "bg-white/5 border-white/15 text-white hover:bg-white/10")}>
        <div className="font-black text-sm flex items-center gap-2"><span className="text-lg">{emoji}</span>{title}</div>
        {sub && <div className="text-xs opacity-80 ml-7">{sub}</div>}
      </button>
    );
    return (
      <div className="min-h-[640px] w-full flex items-center justify-center p-4" style={BG_HOME}>
        <style>{STYLE}</style>
        <div className={PANEL + " p-6 max-w-md w-full"}>
          <div className="text-center mb-1"><span className="text-6xl inline-block glowemoji" style={{ animation: "bob 2.5s ease-in-out infinite" }}>{curSkin.f.idle}</span></div>
          <h1 className="text-5xl font-black text-white text-center tracking-tight leading-none">POKER<span className="gtxt"> GOD</span></h1>
          <p className="text-amber-200 text-center text-[11px] mt-2 mb-3 font-black uppercase tracking-[0.35em]">The Art of the Read</p>
          <div className="grule w-24 mx-auto mb-4"></div>
          <div className="flex justify-center gap-2 mb-4">
            <button onClick={() => { ping("click", muted); setNameInput(name); setScreen("login"); }}
              className="bg-white/5 border border-amber-500/30 text-amber-200 text-xs font-black px-3 py-1.5 rounded-full active:scale-95 transition">👤 {name} ✏️</button>
            <button onClick={() => { ping("click", muted); shareGame(); }}
              className="bg-white/5 border border-amber-500/30 text-amber-200 text-xs font-black px-3 py-1.5 rounded-full active:scale-95 transition">🔗 Share</button>
          </div>
          {note && <div className="text-center mb-3"><span className="inline-block gbtn text-xs font-black px-4 py-1.5 rounded-full" style={{ animation: "pop 0.3s both" }}>{note}</span></div>}
          <div className="bg-black/40 rounded-2xl p-3 mb-4 border border-amber-500/25">
            <div className="flex items-center justify-between mb-2">
              <span className="text-amber-200/90 text-[11px] font-black uppercase tracking-widest">🎭 Locker · Lvl {lvl}</span>
              <span className="text-amber-300 text-[11px] font-black">{xp} XP</span>
            </div>
            <div className="flex gap-2 overflow-x-auto pb-1">
              {SKINS.map((s) => {
                const open = s.xp <= xp, sel = s.id === skin;
                return (
                  <button key={s.id} disabled={!open} onClick={() => { ping("click", muted); setSkin(s.id); }}
                    className={"relative shrink-0 w-[68px] rounded-xl border-2 p-1.5 text-center transition " + (sel ? "gsel" : open ? "bg-white/5 border-amber-500/30 active:scale-90" : "bg-black/50 border-white/10 cursor-default")}>
                    <div className="text-3xl" style={!open ? { filter: "grayscale(1)", opacity: 0.4 } : undefined}>{s.f.idle}</div>
                    {!open && <span className="absolute top-0.5 right-1 text-[11px]">🔒</span>}
                    <div className={"text-[9px] font-black leading-tight " + (sel ? "" : open ? "text-white" : "text-amber-300/90")}>{open ? s.name : s.xp + " XP"}</div>
                  </button>
                );
              })}
            </div>
            {nextSkin ? (
              <div className="mt-2">
                <div className="h-2 bg-black/60 rounded-full overflow-hidden"><div className="h-full rounded-full transition-all" style={{ width: prog + "%", background: "linear-gradient(90deg,#fde68a,#caa53a)" }} /></div>
                <div className="text-white/60 text-[10px] mt-1 font-bold">Next: {nextSkin.f.idle} {nextSkin.name} at {nextSkin.xp} XP</div>
              </div>
            ) : <div className="text-amber-300 text-[10px] mt-2 font-black">🏆 Everything unlocked, legend!</div>}
            <div className="mt-2 bg-amber-400/10 border border-amber-300/30 rounded-xl p-2 text-center">
              <div className="text-amber-300 text-[11px] font-black">⚡ {curSkin.name}'s Power: {curSkin.perkName}</div>
              <div className="text-white/85 text-[10px] font-semibold">{curSkin.perkDesc}</div>
            </div>
          </div>
          <div className="grid gap-2 mb-4">
            <Opt active={mode === "showdown"} onClick={() => setMode("showdown")} emoji="🏆" title="Who Wins?" sub="Full board — call the winner." />
            <Opt active={mode === "equity"} onClick={() => setMode("equity")} emoji="🎯" title="Who's Favored?" sub="Half a board — spot the favorite." />
            <Opt active={mode === "range"} onClick={() => setMode("range")} emoji="🦈" title="Hand vs Range" sub="You vs a mystery range." />
            <Opt active={mode === "draft"} onClick={() => setMode("draft")} emoji="🎴" title="Draft & Sweat" sub="Pick 2 of 5 — sweat the runout!" />
          </div>
          {mode !== "range" && (
            <div className="grid grid-cols-3 gap-2 mb-3">
              {[2, 3, 4].map((nn) => (
                <button key={nn} onClick={() => { ping("click", muted); setPlayers(nn); }}
                  className={"py-2.5 rounded-2xl border-2 font-black text-sm transition active:scale-95 " + (players === nn ? "gsel" : "bg-white/5 border-white/15 text-white")}>
                  {nn === 2 ? "Heads Up" : nn + " Players"}
                </button>
              ))}
            </div>
          )}
          <div className="grid grid-cols-3 gap-2 mb-3">
            {Object.keys(DIFF).map((d) => (
              <button key={d} onClick={() => { ping("click", muted); setDiff(d); }}
                className={"py-2.5 rounded-2xl border-2 font-black transition active:scale-95 " + (diff === d ? "gsel" : "bg-white/5 border-white/15 text-white")}>
                <div className="text-sm">{DIFF[d].label}</div><div className="text-[10px] opacity-70">{DIFF[d].m} pts</div>
              </button>
            ))}
          </div>
          <button onClick={() => { ping("click", muted); setBlitz((b) => !b); }}
            className={"w-full py-3 rounded-2xl border-2 text-sm font-black mb-4 transition active:scale-95 " + (blitz ? "gsel" : "bg-white/5 border-white/15 text-white")}>
            ⚡ {blitz ? "BLITZ ON — 60-second sprint!" : "Blitz Mode: off"}
          </button>
          <button onClick={start} className="w-full py-4 rounded-2xl gbtn font-black text-xl active:scale-95 transition">🎲 DEAL ME IN</button>
        </div>
      </div>
    );
  }

  if (screen === "over") {
    const rank = stats.score > 600 ? "🦈 Card Shark" : stats.score > 350 ? "🐂 Table Bull" : stats.score > 150 ? "🐣 Rising Rookie" : "🐠 Fish Food";
    return (
      <div className="min-h-[640px] w-full flex items-center justify-center p-4" style={BG_HOME}>
        <style>{STYLE}</style>
        <div className={"relative " + PANEL + " p-7 max-w-sm w-full text-center overflow-hidden"}>
          {stats.correct > 0 && <Confetti />}
          <div className="text-5xl mb-1" style={{ animation: "pop 0.5s both" }}>⏰</div>
          <h2 className="text-3xl font-black text-white">TIME!</h2>
          <p className="text-amber-200 text-sm mb-4 font-semibold">{name} · {rank} · +{stats.score} XP</p>
          <div className="text-6xl font-black gtxt mb-1" style={{ animation: "pop 0.5s 0.1s both" }}>{stats.score}</div>
          <div className="text-white/60 text-xs uppercase tracking-widest mb-5 font-bold">points this run</div>
          <div className="grid grid-cols-3 gap-2 mb-6 text-white">
            <div className="bg-white/5 rounded-2xl py-3 border border-amber-500/20"><div className="text-xl font-black">{stats.correct}/{stats.total}</div><div className="text-[10px] text-amber-200">nailed</div></div>
            <div className="bg-white/5 rounded-2xl py-3 border border-amber-500/20"><div className="text-xl font-black">{acc}%</div><div className="text-[10px] text-amber-200">accuracy</div></div>
            <div className="bg-white/5 rounded-2xl py-3 border border-amber-500/20"><div className="text-xl font-black">{stats.best}🔥</div><div className="text-[10px] text-amber-200">best run</div></div>
          </div>
          <button onClick={start} className="w-full py-3 rounded-2xl gbtn font-black mb-2 active:scale-95 transition">🔁 Run It Back</button>
          <button onClick={() => { ping("click", muted); shareScore(); }} className="w-full py-3 rounded-2xl bg-white/10 border-2 border-amber-500/35 text-amber-200 font-black mb-2 active:scale-95 transition">🔗 Share My Score</button>
          {note && <div className="mb-2"><span className="inline-block gbtn text-xs font-black px-4 py-1.5 rounded-full" style={{ animation: "pop 0.3s both" }}>{note}</span></div>}
          <button onClick={() => setScreen("menu")} className="w-full py-2 text-white/60 text-sm hover:text-white font-semibold">← Menu (Lvl {lvl} · {xp} XP)</button>
        </div>
      </div>
    );
  }

  const lowTime = blitz && timeLeft <= 10;
  const Chip = ({ children, hot }) => (<span className={"flex items-center gap-1 px-3 py-1.5 rounded-full font-black text-sm " + (hot ? "bg-rose-600 text-white animate-pulse" : "bg-black/50 text-white border border-amber-500/25")}>{children}</span>);
  const boardLabel = round.mode === "draft" ? (revealed ? "Showdown" : sweating ? "Running…" : "Pre-draft") : round.mode === "showdown" ? "River" : round.street;
  return (
    <div className="min-h-[640px] w-full p-3 sm:p-5 relative overflow-hidden" style={{ ...BG, animation: shake ? "shake 0.55s" : undefined }}>
      <style>{STYLE}</style>
      {popc > 0 && <GoldFlash key={"f" + popc} />}
      {popc > 0 && <Confetti key={popc} />}
      {floatPts && <div key={floatPts.k} className="absolute left-1/2 top-[30%] z-40 pointer-events-none text-4xl font-black" style={{ color: floatPts.color, animation: "floatup 1.1s ease-out forwards", textShadow: "0 2px 10px rgba(0,0,0,0.7)" }}>{floatPts.text}</div>}
      {unlock && (
        <div className="absolute left-1/2 top-16 z-50 pointer-events-none" style={{ animation: "toast 3.6s ease-out forwards" }}>
          <div className="gbtn font-black px-5 py-3 rounded-2xl shadow-2xl text-center">
            <div className="text-3xl">{unlock.f.idle}</div><div className="text-sm">NEW CHARACTER UNLOCKED!</div><div className="text-lg">{unlock.name}</div>
          </div>
        </div>
      )}
      <div className="flex items-center justify-between flex-wrap gap-2 mb-2 max-w-3xl mx-auto relative z-10">
        <div className="flex gap-1.5 flex-wrap">
          <Chip>🏆 {stats.score}</Chip><Chip>🎯 {acc}%</Chip>
          {blitz && <Chip hot={lowTime}>⏰ {timeLeft}s</Chip>}
        </div>
        <div className="flex gap-2">
          <button onClick={() => { if (!muted) { try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch (e) {} } setMuted((m) => !m); }} className="px-2.5 py-1.5 rounded-full bg-black/50 text-white text-sm active:scale-90 transition border border-amber-500/25">{muted ? "🔇" : "🔊"}</button>
          <button onClick={() => setScreen("menu")} className="px-3 py-1.5 rounded-full bg-black/50 text-white text-xs font-bold active:scale-90 transition border border-amber-500/25">↩ Menu</button>
        </div>
      </div>
      <div className="max-w-3xl mx-auto mb-2 relative z-10"><ComboMeter streak={stats.streak} /></div>
      <div className="flex items-center gap-2 max-w-3xl mx-auto mb-3 relative z-10">
        <Avatar skin={curSkin} mood={mood} name={name} size="text-5xl" />
        <div className="bg-white rounded-2xl rounded-bl-none px-4 py-2 shadow-lg font-bold text-stone-900 text-sm" style={{ animation: "pop 0.3s both" }}>{msg}</div>
        <span className="ml-auto shrink-0 bg-black/50 text-amber-300 text-[10px] font-black px-2.5 py-1 rounded-full whitespace-nowrap border border-amber-500/25">⚡ {curSkin.perkName}</span>
      </div>
      <div className="max-w-3xl mx-auto relative z-10">
        <div className="text-center mb-2"><span className="text-amber-200/80 text-xs uppercase tracking-widest font-black bg-black/40 px-3 py-1 rounded-full border border-amber-500/20">🃏 Board · {boardLabel}</span></div>
        <div className="felt rounded-3xl py-4 px-3 mb-5">
          <div className="flex justify-center gap-2 flex-wrap">
            {round.mode === "draft"
              ? [0, 1, 2, 3, 4].map((i) => { const shownCount = revealed ? 5 : boardShown; return i < shownCount ? <PlayingCard key={popc + "-b-" + i} c={round.fullBoard[i]} idx={i} anim /> : <EmptySlot key={i} />; })
              : [0, 1, 2, 3, 4].map((i) => (round.board[i] ? <PlayingCard key={popc + "-" + i} c={round.board[i]} idx={i} anim /> : <EmptySlot key={i} />))}
          </div>
        </div>
        {round.mode === "draft"
          ? <DraftView round={round} draftSel={draftSel} sweating={sweating} revealed={revealed} toggleDraft={toggleDraft} lockDraft={lockDraft} liveEq={liveEq} pop={popc} name={name} />
          : round.mode === "range"
          ? <RangeView round={round} revealed={revealed} pickv={pickv} correct={correct} submit={submit} pop={popc} name={name} />
          : <HandsView round={round} players={players} revealed={revealed} pickv={pickv} correct={correct} submit={submit} pop={popc} who={who} />}
        {revealed && (
          <div className="mt-5 text-center">
            {round.mode !== "range" && round.mode !== "draft" && (
              <p className="text-white font-bold text-sm mb-3 bg-black/40 inline-block px-4 py-1.5 rounded-full border border-amber-500/20">
                {round.winners.length > 1 ? "💸 Split: " + round.winners.map((i) => who(i)).join(" & ") : "💰 " + who(round.winners[0]) + " " + (round.mode === "showdown" ? "scoops it!" : "is the fave!")}
              </p>
            )}
            {!blitz
              ? <div><button onClick={nextRound} className="px-7 py-3.5 rounded-2xl gbtn font-black text-lg active:scale-95 transition">Next Hand →</button></div>
              : <p className="text-amber-200/70 text-xs font-bold animate-pulse">⚡ dealing next…</p>}
          </div>
        )}
      </div>
    </div>
  );
}

function HandsView({ round, players, revealed, pickv, correct, submit, pop, who }) {
  return (
    <React.Fragment>
      <p className="text-center text-white font-black mb-3 text-lg drop-shadow">{revealed ? (correct ? "🎉 NAILED IT!" : "💀 WHIFFED!") : round.mode === "showdown" ? "👉 Who wins the pot?" : "👉 Who's the favorite?"}</p>
      <div className={"grid gap-3 " + (players === 2 ? "grid-cols-2" : players === 3 ? "grid-cols-3" : "grid-cols-2 sm:grid-cols-4")}>
        {round.hands.map((hand, i) => {
          const isW = round.winners.includes(i), isP = pickv === i;
          let cls = "bg-white/5 border-amber-500/25";
          if (revealed) cls = isW ? "bg-emerald-500/25 border-emerald-300 ring-4 ring-emerald-300/40" : isP ? "bg-rose-600/25 border-rose-300 ring-4 ring-rose-300/40" : "bg-black/40 border-white/10 opacity-50";
          const sc = round.scores ? round.scores[i] : null, eq = round.equity ? round.equity[i] : null;
          return (
            <button key={i} disabled={revealed} onClick={() => submit(i)}
              className={"p-3 rounded-2xl border-2 transition " + cls + " " + (!revealed ? "hover:scale-105 hover:border-amber-300 active:scale-95 cursor-pointer" : "")}>
              <div className="flex items-center justify-between mb-2"><span className={"text-xs font-black truncate max-w-[80px] " + (i === 0 ? "text-amber-300" : "text-white")}>{who(i)}</span>{revealed && isW && <span>✅</span>}{revealed && isP && !isW && <span>❌</span>}</div>
              <div className="flex justify-center gap-1.5">{hand.map((c, k) => <PlayingCard key={pop + "-" + k} c={c} small idx={k} anim />)}</div>
              {revealed && (<div className="mt-2">
                {sc && <div className="text-white text-[11px] font-black leading-tight">{describe(sc)}</div>}
                {eq != null && (<React.Fragment><div className="text-white text-sm font-black">{(eq * 100).toFixed(1)}%</div><div className="h-2 bg-black/50 rounded-full mt-1 overflow-hidden"><div className="h-full rounded-full" style={{ width: (eq * 100) + "%", background: isW ? "linear-gradient(90deg,#6ee7b7,#34d399)" : "#94a3b8" }} /></div></React.Fragment>)}
              </div>)}
            </button>
          );
        })}
      </div>
    </React.Fragment>
  );
}

function RangeView({ round, revealed, pickv, correct, submit, pop, name }) {
  const heroMade = round.board.length >= 3 ? describe(evaluate7([...round.hero, ...round.board])) : null;
  const buckets = [{ id: "fav", label: "Favorite 💪", sub: ">56%" }, { id: "flip", label: "Coin Flip 🪙", sub: "44–56%" }, { id: "dog", label: "Underdog 🐶", sub: "<44%" }];
  return (
    <React.Fragment>
      <div className="flex items-center justify-center gap-4 sm:gap-6 mb-4">
        <div className="text-center">
          <div className="text-amber-300 text-[10px] uppercase tracking-widest font-black mb-1 truncate max-w-[110px]">{name || "Your"} Hand</div>
          <div className="flex gap-1.5">{round.hero.map((c, k) => <PlayingCard key={pop + "-" + k} c={c} idx={k} anim />)}</div>
          {heroMade && <div className="text-white text-[11px] mt-1 font-bold">{heroMade}</div>}
        </div>
        <div className="text-amber-300 font-black text-2xl drop-shadow">⚔️</div>
        <div className="text-center">
          <div className="text-amber-200 text-[10px] uppercase tracking-widest font-black mb-1">Mystery Range</div>
          <div className="flex gap-1.5"><CardBack /><CardBack /></div>
          <div className="text-amber-300 text-[11px] mt-1 font-black max-w-[120px]">{round.range}</div>
        </div>
      </div>
      <p className="text-center text-white font-black mb-3 text-lg drop-shadow">{revealed ? (correct ? "🎉 NAILED IT!" : "💀 WHIFFED!") : "👉 How do you stack up?"}</p>
      <div className="grid grid-cols-3 gap-2">
        {buckets.map((b) => {
          const isW = round.bucket === b.id, isP = pickv === b.id;
          let cls = "bg-white/5 border-amber-500/25";
          if (revealed) cls = isW ? "bg-emerald-500/25 border-emerald-300 ring-4 ring-emerald-300/40" : isP ? "bg-rose-600/25 border-rose-300 ring-4 ring-rose-300/40" : "bg-black/40 border-white/10 opacity-50";
          return (
            <button key={b.id} disabled={revealed} onClick={() => submit(b.id)}
              className={"p-3 rounded-2xl border-2 text-center transition " + cls + " " + (!revealed ? "hover:scale-105 hover:border-amber-300 active:scale-95 cursor-pointer" : "")}>
              <div className="text-white font-black text-sm">{b.label}</div><div className="text-amber-200 text-[10px] font-bold">{b.sub}</div>
            </button>
          );
        })}
      </div>
      {revealed && (
        <div className="mt-4 text-center">
          <div className="text-amber-200 text-sm font-bold">Your equity vs <span className="text-amber-300">{round.range}</span></div>
          <div className="text-4xl font-black gtxt drop-shadow" style={{ animation: "pop 0.4s both" }}>{(round.equity * 100).toFixed(1)}%</div>
          <div className="h-3 bg-black/50 rounded-full mt-2 max-w-xs mx-auto overflow-hidden"><div className="h-full rounded-full" style={{ width: (round.equity * 100) + "%", background: "linear-gradient(90deg,#fde047,#caa53a)" }} /></div>
        </div>
      )}
    </React.Fragment>
  );
}

function DraftView({ round, draftSel, sweating, revealed, toggleDraft, lockDraft, liveEq, pop, name }) {
  const heroSel = draftSel.map((i) => round.pool[i]);
  const heroMade = revealed && heroSel.length === 2 ? describe(evaluate7([...heroSel, ...round.fullBoard])) : null;
  const drafting = !sweating && !revealed;
  const multi = round.opps.length > 1;
  // Resolve showdown result for display (when revealed)
  let resultLine = null;
  if (revealed && heroSel.length === 2) {
    const all = [heroSel, ...round.opps];
    let best = null, idxs = [];
    for (let h = 0; h < all.length; h++) { const sc = evaluate7([...all[h], ...round.fullBoard]); if (best === null || cmp(sc, best) > 0) { best = sc; idxs = [h]; } else if (cmp(sc, best) === 0) idxs.push(h); }
    const heroIn = idxs.includes(0);
    if (heroIn && idxs.length === 1) resultLine = "💰 " + (name || "You") + " scoop the pot!";
    else if (heroIn && idxs.length > 1) resultLine = "🤝 Chopped — " + (name || "You") + " split it.";
    else resultLine = "💀 The field got there.";
  }
  return (
    <React.Fragment>
      {drafting && (
        <React.Fragment>
          <div className="text-center text-rose-300 text-[10px] uppercase tracking-widest font-black mb-2">{multi ? "The Field — Mystery Ranges" : "Opponent — Mystery Range"}</div>
          <div className="flex justify-center gap-4 flex-wrap mb-4">
            {round.opps.map((o, k) => (
              <div key={k} className="text-center">
                <div className="text-white/70 text-[10px] font-black mb-1">{POS[k + 1] || ("Opp " + (k + 1))}</div>
                <div className="flex gap-1.5 justify-center"><CardBack small /><CardBack small /></div>
                <div className="text-amber-300 text-[10px] mt-1 font-black max-w-[110px] leading-tight">{round.oppRanges[k]}</div>
              </div>
            ))}
          </div>
          <p className="text-center text-white font-black mb-1 text-lg drop-shadow">👉 Tap to pick 2 ({draftSel.length}/2)</p>
          <p className="text-center text-amber-200/70 text-[11px] mb-3">Tap a chosen card to drop it · tap another to swap</p>
          <div className="text-center text-amber-200 text-[10px] uppercase tracking-widest font-black mb-2">{name || "Your"} Draft Pool</div>
          <div className="flex justify-center gap-2 mb-4 flex-wrap">
            {round.pool.map((c, i) => {
              const sel = draftSel.includes(i);
              return (
                <button key={i} onClick={() => toggleDraft(i)} className={"rounded-lg transition " + (sel ? "-translate-y-2" : "hover:-translate-y-1")}
                  style={{ animation: "dealin .4s " + (i * 0.07) + "s both", filter: sel ? "drop-shadow(0 0 10px rgba(233,196,90,.95))" : undefined }}>
                  <div style={sel ? { outline: "3px solid #e9c45a", borderRadius: 11 } : undefined}><PlayingCard c={c} /></div>
                </button>
              );
            })}
          </div>
          <div className="text-center">
            <button onClick={lockDraft} disabled={draftSel.length !== 2}
              className={"px-7 py-3 rounded-2xl font-black text-lg transition " + (draftSel.length === 2 ? "gbtn active:scale-95" : "bg-white/10 text-white/40 border-2 border-white/15")}>
              {draftSel.length === 2 ? "🔒 Lock In & Sweat!" : "Pick 2 to continue"}
            </button>
          </div>
        </React.Fragment>
      )}

      {(sweating || revealed) && (
        <React.Fragment>
          {sweating && <p className="text-center text-amber-300 font-black mb-2 text-lg drop-shadow animate-pulse">🔥 Running it out…</p>}
          {revealed && <p className="text-center text-white font-black mb-2 text-lg drop-shadow">Showdown!</p>}
          <div className="text-center mb-2">
            <div className="text-amber-300 text-[10px] uppercase tracking-widest font-black mb-1 truncate">{name || "You"}</div>
            <div className="flex gap-1.5 justify-center">{heroSel.map((c, k) => <PlayingCard key={k} c={c} />)}</div>
            {heroMade && <div className="text-white text-[11px] mt-1 font-black">{heroMade}</div>}
          </div>
          <div className="text-amber-300 font-black text-xl drop-shadow text-center my-1">⚔️</div>
          <div className="flex justify-center gap-4 flex-wrap mb-1">
            {round.opps.map((o, k) => (
              <div key={k} className="text-center">
                <div className="text-rose-300 text-[10px] uppercase tracking-widest font-black mb-1">{POS[k + 1] || ("Opp " + (k + 1))}</div>
                <div className="flex gap-1.5 justify-center">{revealed
                  ? o.map((c, j) => <PlayingCard key={j} c={c} small />)
                  : <React.Fragment><CardBack small /><CardBack small /></React.Fragment>}</div>
                {revealed && <div className="text-white text-[11px] mt-1 font-bold leading-tight">{describe(evaluate7([...o, ...round.fullBoard]))}</div>}
                <div className="text-rose-300/80 text-[10px] mt-0.5 font-black max-w-[110px] leading-tight">{round.oppRanges[k]}</div>
              </div>
            ))}
          </div>
          {sweating && liveEq != null && (
            <div className="mt-3"><EquityBar eq={liveEq} oppLabel={multi ? "FIELD" : "OPP"} /></div>
          )}
          {revealed && resultLine && (
            <p className="mt-3 text-center text-white font-bold text-sm bg-black/40 inline-block px-4 py-1.5 rounded-full border border-amber-500/20 mx-auto" style={{ display: "block", width: "fit-content" }}>{resultLine}</p>
          )}
        </React.Fragment>
      )}
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
