/* ============ POKER ENGINE ============ */
const SUITS = ["♠", "♥", "♦", "♣"];
const RANK_W = { 2:"Two",3:"Three",4:"Four",5:"Five",6:"Six",7:"Seven",8:"Eight",9:"Nine",10:"Ten",11:"Jack",12:"Queen",13:"King",14:"Ace" };
const RANK_S = { 11:"J",12:"Q",13:"K",14:"A" };
const rs = (r) => RANK_S[r] || String(r);
const plural = (w) => (w.endsWith("x") ? w + "es" : w + "s");
const key = (c) => c.r * 4 + c.s;
const pick = (a) => a[Math.floor(Math.random() * a.length)];

function makeDeck() { const d = []; for (let r = 2; r <= 14; r++) for (let s = 0; s < 4; s++) d.push({ r, s }); return d; }
const FULL = makeDeck();
function shuffled() { const d = makeDeck(); for (let i = d.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [d[i], d[j]] = [d[j], d[i]]; } return d; }
function pickN(arr, n) { const a = arr.slice(); for (let i = 0; i < n; i++) { const j = i + Math.floor(Math.random() * (a.length - i)); [a[i], a[j]] = [a[j], a[i]]; } return a.slice(0, n); }
function straightHigh(rankArr) {
  const set = new Set(rankArr); if (set.has(14)) set.add(1);
  const sorted = [...set].sort((a, b) => b - a); let run = 1;
  for (let i = 1; i < sorted.length; i++) { if (sorted[i] === sorted[i - 1] - 1) { run++; if (run >= 5) return sorted[i - 4]; } else run = 1; }
  return null;
}
function evaluate7(cards) {
  const ranks = cards.map((c) => c.r); const sg = [[], [], [], []];
  for (const c of cards) sg[c.s].push(c.r);
  let fs = -1; for (let s = 0; s < 4; s++) if (sg[s].length >= 5) fs = s;
  if (fs >= 0) { const sf = straightHigh(sg[fs]); if (sf) return [8, sf]; }
  const counts = {}; for (const r of ranks) counts[r] = (counts[r] || 0) + 1;
  const g = Object.keys(counts).map((r) => [+r, counts[r]]).sort((a, b) => b[1] - a[1] || b[0] - a[0]);
  if (g[0][1] === 4) return [7, g[0][0], Math.max(...ranks.filter((r) => r !== g[0][0]))];
  if (g[0][1] === 3 && g[1] && g[1][1] >= 2) return [6, g[0][0], g[1][0]];
  if (fs >= 0) return [5, ...sg[fs].slice().sort((a, b) => b - a).slice(0, 5)];
  const sh = straightHigh(ranks); if (sh) return [4, sh];
  if (g[0][1] === 3) return [3, g[0][0], ...ranks.filter((r) => r !== g[0][0]).sort((a, b) => b - a).slice(0, 2)];
  if (g[0][1] === 2 && g[1] && g[1][1] === 2) return [2, g[0][0], g[1][0], Math.max(...ranks.filter((r) => r !== g[0][0] && r !== g[1][0]))];
  if (g[0][1] === 2) return [1, g[0][0], ...ranks.filter((r) => r !== g[0][0]).sort((a, b) => b - a).slice(0, 3)];
  return [0, ...ranks.slice().sort((a, b) => b - a).slice(0, 5)];
}
function cmp(a, b) { const n = Math.max(a.length, b.length); for (let i = 0; i < n; i++) { const x = a[i] || 0, y = b[i] || 0; if (x !== y) return x - y; } return 0; }
function describe(score) {
  const c = score[0];
  if (c === 8) return score[1] === 14 ? "Royal Flush 👑" : `Straight Flush, ${RANK_W[score[1] === 1 ? 5 : score[1]]}-high`;
  if (c === 7) return `Four ${plural(RANK_W[score[1]])} 🤯`;
  if (c === 6) return `${plural(RANK_W[score[1]])} full of ${plural(RANK_W[score[2]])}`;
  if (c === 5) return `Flush, ${RANK_W[score[1]]}-high`;
  if (c === 4) return `Straight, ${RANK_W[score[1] === 1 ? 5 : score[1]]}-high`;
  if (c === 3) return `Trip ${plural(RANK_W[score[1]])}`;
  if (c === 2) return `Two Pair, ${plural(RANK_W[score[1]])} & ${plural(RANK_W[score[2]])}`;
  if (c === 1) return `Pair of ${plural(RANK_W[score[1]])}`;
  return `${RANK_W[score[1]]}-high`;
}
function bestIdxOf(hands, board) {
  let best = null, idx = []; const scores = [];
  for (let h = 0; h < hands.length; h++) { const sc = evaluate7([...hands[h], ...board]); scores.push(sc);
    if (best === null || cmp(sc, best) > 0) { best = sc; idx = [h]; } else if (cmp(sc, best) === 0) idx.push(h); }
  return { idx, scores };
}
function computeEquity(hands, board, iters) {
  const used = new Set([...hands.flat(), ...board].map(key));
  const rem = FULL.filter((c) => !used.has(key(c)));
  const wins = new Array(hands.length).fill(0); const need = 5 - board.length;
  for (let it = 0; it < iters; it++) {
    const full = need ? [...board, ...pickN(rem, need)] : board;
    let best = null, bidx = [];
    for (let h = 0; h < hands.length; h++) { const sc = evaluate7([...hands[h], ...full]);
      if (best === null || cmp(sc, best) > 0) { best = sc; bidx = [h]; } else if (cmp(sc, best) === 0) bidx.push(h); }
    const share = 1 / bidx.length; for (const i of bidx) wins[i] += share;
  }
  return wins.map((w) => w / iters);
}
const RANGES = [
  { name: "Any Pocket Pair", test: (a, b) => a.r === b.r },
  { name: "Any Ace", test: (a, b) => a.r === 14 || b.r === 14 },
  { name: "Broadway (T+)", test: (a, b) => a.r >= 10 && b.r >= 10 },
  { name: "Suited Connectors", test: (a, b) => a.s === b.s && Math.abs(a.r - b.r) === 1 },
  { name: "Any Two Suited", test: (a, b) => a.s === b.s },
  { name: "Premiums (JJ+, AK, AQ)", test: (a, b) => (a.r === b.r && a.r >= 11) || ([a.r, b.r].includes(14) && ([a.r, b.r].includes(13) || [a.r, b.r].includes(12))) },
  { name: "Total Wildcard 🃏", test: () => true },
];
function computeRangeEquity(hero, board, test, iters) {
  const used = new Set([...hero, ...board].map(key));
  const rem = FULL.filter((c) => !used.has(key(c)));
  const combos = [];
  for (let i = 0; i < rem.length; i++) for (let j = i + 1; j < rem.length; j++) if (test(rem[i], rem[j])) combos.push([rem[i], rem[j]]);
  if (!combos.length) return null;
  let hw = 0; const need = 5 - board.length;
  for (let it = 0; it < iters; it++) {
    const opp = combos[Math.floor(Math.random() * combos.length)];
    const os = new Set(opp.map(key)); const pool = rem.filter((c) => !os.has(key(c)));
    const full = need ? [...board, ...pickN(pool, need)] : board;
    const d = cmp(evaluate7([...hero, ...full]), evaluate7([...opp, ...full]));
    if (d > 0) hw += 1; else if (d === 0) hw += 0.5;
  }
  return hw / iters;
}
function streetName(n) { return n === 0 ? "preflop" : n === 3 ? "flop" : "turn"; }
function randStreet() { const r = Math.random(); return r < 0.2 ? 0 : r < 0.6 ? 3 : 4; }
function deal(mode, players, diff) {
  if (mode === "range") return dealRange(diff);
  const ITERS = 2800;
  for (let a = 0; a < 60; a++) {
    const deck = shuffled(); let p = 0; const hands = [];
    for (let h = 0; h < players; h++) hands.push([deck[p++], deck[p++]]);
    const last = a >= 58;
    if (mode === "showdown") {
      const board = deck.slice(p, p + 5); const { idx, scores } = bestIdxOf(hands, board);
      const cats = scores.map((s) => s[0]).sort((x, y) => y - x); let ok = true;
      if (diff === "easy") ok = cats[0] > cats[1] && idx.length === 1; else if (diff === "hard") ok = cats[0] === cats[1];
      if (!ok && !last) continue;
      return { mode, hands, board, winners: idx, scores, equity: null, street: "river" };
    } else {
      const sN = randStreet(); const board = deck.slice(p, p + sN);
      const eq = computeEquity(hands, board, ITERS); const srt = [...eq].sort((x, y) => y - x); const gap = srt[0] - srt[1]; let ok = true;
      if (diff === "easy") ok = gap > 0.28; else if (diff === "hard") ok = gap < 0.12;
      if (!ok && !last) continue;
      const mx = Math.max(...eq); const winners = eq.map((e, i) => (mx - e < 0.012 ? i : -1)).filter((i) => i >= 0);
      return { mode, hands, board, winners, equity: eq, scores: null, street: streetName(sN) };
    }
  }
}
function dealRange(diff) {
  const rng = pick(RANGES);
  for (let a = 0; a < 60; a++) {
    const deck = shuffled(); const hero = [deck[0], deck[1]];
    const sN = randStreet(); const board = deck.slice(2, 2 + sN);
    const eq = computeRangeEquity(hero, board, rng.test, 2500); if (eq == null) continue;
    const near = Math.min(Math.abs(eq - 0.56), Math.abs(eq - 0.44)); const last = a >= 58; let ok = true;
    if (diff === "easy") ok = eq > 0.66 || eq < 0.34 || (eq > 0.475 && eq < 0.525); else if (diff === "hard") ok = near < 0.05;
    if (!ok && !last) continue;
    const bucket = eq > 0.56 ? "fav" : eq < 0.44 ? "dog" : "flip";
    return { mode: "range", hero, board, range: rng.name, equity: eq, bucket, street: streetName(sN) };
  }
}

let _ac;
function ping(kind, muted) {
  if (muted) return;
  try {
    _ac = _ac || new (window.AudioContext || window.webkitAudioContext)();
    const ac = _ac, now = ac.currentTime;
    const mk = (f, t, dur, type = "sine", g = 0.09) => {
      const o = ac.createOscillator(), ga = ac.createGain();
      o.type = type; o.frequency.setValueAtTime(f, t);
      ga.gain.setValueAtTime(0, t); ga.gain.linearRampToValueAtTime(g, t + 0.01);
      ga.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(ga); ga.connect(ac.destination); o.start(t); o.stop(t + dur);
    };
    if (kind === "good") { mk(660, now, 0.14); mk(990, now + 0.08, 0.22); }
    else if (kind === "great") { mk(660, now, 0.12); mk(880, now + 0.07, 0.12); mk(1320, now + 0.15, 0.25); }
    else if (kind === "unlock") { mk(523, now, 0.15); mk(659, now + 0.12, 0.15); mk(784, now + 0.24, 0.15); mk(1047, now + 0.36, 0.3); }

function Confetti() {
  const cols = ["#fbbf24", "#f472b6", "#34d399", "#60a5fa", "#a78bfa", "#f87171", "#facc15"];
  const pieces = Array.from({ length: 50 }, (_, i) => ({ l: Math.random() * 100, c: cols[i % cols.length], d: Math.random() * 0.3, dur: 1.5 + Math.random() * 1.3, w: 6 + Math.random() * 8, rot: Math.random() * 360 }));
  return (
    <div className="pointer-events-none absolute inset-0 overflow-hidden z-30">
      {pieces.map((p, i) => (<div key={i} style={{ position: "absolute", top: "-20px", left: `${p.l}%`, width: p.w, height: p.w * 0.55, background: p.c, borderRadius: 2, transform: `rotate(${p.rot}deg)`, animation: `cf ${p.dur}s ${p.d}s ease-in forwards` }} />))}
    </div>
  );
}

function ComboMeter({ streak }) {
  const tier = streak >= 9 ? { n: "INFERNO 🔥🔥🔥", g: "linear-gradient(90deg,#f59e0b,#ef4444,#f43f5e)" }
    : streak >= 6 ? { n: "BLAZING 🔥🔥", g: "linear-gradient(90deg,#fbbf24,#fb923c)" }

  const fill = Math.min(streak, 9) / 9 * 100;
  return (
    <div className="bg-black/25 rounded-full px-3 py-1.5 flex items-center gap-2">

  const shareScore = async () => {
    const url = window.location.href;
    const text = `I just scored ${stats.score} in POKER GOD 🃏 (${acc}% reads). Bet you can't beat me 😏`;
    try { if (navigator.share) { await navigator.share({ title: "POKER GOD", text, url }); } else { await navigator.clipboard.writeText(`${text} ${url}`); notify("Score copied! 📋"); } }
    catch (e) { try { await navigator.clipboard.writeText(`${text} ${url}`); notify("Score copied! 📋"); } catch (e2) {} }
  };

  const submit = (choice) => {
    if (revealed) return;
    setPickv(choice);
    const ok = mode === "range" ? choice === round.bucket : round.winners.includes(choice);
    const perk = curSkin.perk;
    const step = perk === "streak" ? 8 : 5;
    let gain = 0, xpGain = 0, saved = false, doubled = false;
    if (ok) {
      gain = Math.round((10 + stats.streak * step) * MULT[diff]);
      if (perk === "brain" && diff === "hard") gain = Math.round(gain * 1.25);
      if (perk === "double" && Math.random() < 0.2) { gain *= 2; doubled = true; }
      xpGain = perk === "hoard" ? Math.round(gain * 1.5) : gain;
    } else if (perk === "shield" && !shieldUsed) { saved = true; setShieldUsed(true); }
    else if (perk === "thick") { gain = 5; xpGain = 5; }
    const newStreak = ok ? stats.streak + 1 : saved ? stats.streak : 0;
    setRevealed(true);
    setStats((s) => ({ score: s.score + gain, streak: ok ? s.streak + 1 : saved ? s.streak : 0, best: Math.max(s.best, ok ? s.streak + 1 : s.streak), correct: s.correct + (ok ? 1 : 0), total: s.total + 1 }));
    if (ok) {
      const big = newStreak >= 3;
      ping(big ? "great" : "good", muted); setPopc((k) => k + 1);
      setMood(big ? "wow" : "happy");
      setMsg(doubled ? "DOUBLE PAYOUT! 🍀💰" : big ? pick(Q.great) : pick(Q.good));
      setFloatPts({ k: Date.now(), text: `+${gain}${doubled ? " 🍀" : ""}`, color: doubled ? "#86efac" : "#fcd34d" });
    } else if (saved) {
      ping("good", muted); setMood("happy"); setMsg("🐱 Nine Lives! Streak saved!");
      setFloatPts({ k: Date.now(), text: "🛡️ SAVED", color: "#67e8f9" });
    } else {
      ping("bad", muted); setShake(true); setTimeout(() => setShake(false), 550);
      setMood("sad"); setMsg(pick(Q.bad));
      if (gain > 0) setFloatPts({ k: Date.now(), text: `+${gain}`, color: "#cbd5e1" });
    }
    if (xpGain > 0) {
      const before = unlockedCount(xp), nx = xp + xpGain, after = unlockedCount(nx);
      setXp(nx);
      if (after > before) { const ns = SKINS[after - 1]; setUnlock(ns); setSkin(ns.id); setTimeout(() => ping("unlock", muted), 250); setTimeout(() => setUnlock(null), 3600); }
    }
    if (blitz) setTimeout(() => freshRound(mode, players, diff), 1100);
  };

  const acc = stats.total ? Math.round((stats.correct / stats.total) * 100) : 0;
  const correct = revealed && (mode === "range" ? pickv === round.bucket : round.winners.includes(pickv));
  const lvl = unlockedCount(xp);
  const nextSkin = SKINS.find((s) => s.xp > xp);

  if (screen === "boot") return (<div className="min-h-[640px] w-full flex items-center justify-center" style={BG}><style>{STYLE}</style><div className="text-white font-black text-xl animate-pulse">🃏 Shuffling the deck…</div></div>);

  if (screen === "login") return (
    <div className="min-h-[640px] w-full flex items-center justify-center p-4" style={BG}>
      <style>{STYLE}</style>
      <div className="bg-black/25 backdrop-blur rounded-3xl p-7 max-w-sm w-full border-2 border-white/15 shadow-2xl text-center">
        <span className="text-6xl inline-block" style={{ animation: "bob 2.5s ease-in-out infinite" }}>{curSkin.f.idle}</span>
        <h1 className="text-4xl font-black text-white mt-2 leading-none">POKER<span className="text-amber-300"> GOD</span></h1>
        <p className="text-pink-200 text-[11px] mt-1.5 font-black uppercase tracking-[0.3em] mb-5">The Art of the Read</p>
        <p className="text-white font-bold mb-3">{name ? "Change your name, legend?" : "What should we call you, legend?"}</p>
        <input value={nameInput} onChange={(e) => setNameInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") confirmName(); }}
          maxLength={16} placeholder="Your screen name"
          className="w-full text-center px-4 py-3 rounded-2xl font-black text-purple-900 text-lg outline-none bg-white mb-2 placeholder:text-purple-300" />
        <p className="text-white/50 text-[11px] mb-5">{nameInput.trim().length}/16 · you can change this anytime</p>
        <button onClick={confirmName} disabled={!nameInput.trim()}
          className={`w-full py-4 rounded-2xl font-black text-xl shadow-xl transition ${nameInput.trim() ? "bg-gradient-to-r from-amber-400 to-pink-500 text-white active:scale-95 hover:brightness-110" : "bg-white/20 text-white/40"}`}>
          🎲 Enter the Table
        </button>
      </div>
    </div>
  );

  if (screen === "menu") {
    const prevX = nextSkin ? (SKINS[SKINS.indexOf(nextSkin) - 1]?.xp || 0) : SKINS[SKINS.length - 1].xp;
    const prog = nextSkin ? Math.max(0, Math.min(100, ((xp - prevX) / (nextSkin.xp - prevX)) * 100)) : 100;
    const Opt = ({ active, onClick, emoji, title, sub }) => (
      <button onClick={() => { ping("click", muted); onClick(); }}
        className={`text-left p-3 rounded-2xl border-2 transition active:scale-95 ${active ? "bg-white border-white text-purple-900 shadow-lg scale-[1.02]" : "bg-white/10 border-white/20 text-white hover:bg-white/15"}`}>
        <div className="font-black text-sm flex items-center gap-2"><span className="text-lg">{emoji}</span>{title}</div>
        {sub && <div className="text-xs opacity-80 ml-7">{sub}</div>}
      </button>
    );
    return (
      <div className="min-h-[640px] w-full flex items-center justify-center p-4" style={BG}>
        <style>{STYLE}</style>
        <div className="bg-black/25 backdrop-blur rounded-3xl p-6 max-w-md w-full border-2 border-white/15 shadow-2xl">
          <div className="text-center mb-1"><span className="text-5xl inline-block" style={{ animation: "bob 2.5s ease-in-out infinite" }}>{curSkin.f.idle}</span></div>
          <h1 className="text-4xl font-black text-white text-center tracking-tight leading-none">POKER<span className="text-amber-300"> GOD</span></h1>
          <p className="text-pink-200 text-center text-[11px] mt-1.5 mb-3 font-black uppercase tracking-[0.3em]">The Art of the Read</p>
          <div className="flex justify-center gap-2 mb-4">
            <button onClick={() => { ping("click", muted); setNameInput(name); setScreen("login"); }}
              className="bg-white/10 border border-white/20 text-white text-xs font-black px-3 py-1.5 rounded-full active:scale-95 transition">👤 {name} ✏️</button>
            <button onClick={() => { ping("click", muted); shareGame(); }}
              className="bg-white/10 border border-white/20 text-white text-xs font-black px-3 py-1.5 rounded-full active:scale-95 transition">🔗 Share</button>
          </div>
          {note && <div className="text-center mb-3"><span className="inline-block bg-emerald-400 text-emerald-950 text-xs font-black px-4 py-1.5 rounded-full" style={{ animation: "pop 0.3s both" }}>{note}</span></div>}
          <div className="bg-black/20 rounded-2xl p-3 mb-4">
            <div className="flex items-center justify-between mb-2">
              <span className="text-white/80 text-[11px] font-black uppercase tracking-widest">🎭 Locker · Lvl {lvl}</span>
              <span className="text-amber-300 text-[11px] font-black">{xp} XP</span>
            </div>
            <div className="flex gap-2 overflow-x-auto pb-1">
              {SKINS.map((s) => {
                const open = s.xp <= xp, sel = s.id === skin;
                return (
                  <button key={s.id} disabled={!open} onClick={() => { ping("click", muted); setSkin(s.id); }}
                    className={`relative shrink-0 w-16 rounded-xl border-2 p-1.5 text-center transition ${sel ? "bg-white border-white" : open ? "bg-white/10 border-white/30 active:scale-90" : "bg-black/30 border-white/10 cursor-default"}`}>
                    <div className="text-2xl" style={!open ? { filter: "grayscale(1)", opacity: 0.4 } : undefined}>{s.f.idle}</div>
                    {!open && <span className="absolute top-0.5 right-1 text-[11px]">🔒</span>}
                    <div className={`text-[9px] font-black leading-tight ${sel ? "text-purple-900" : open ? "text-white" : "text-amber-300/90"}`}>{open ? s.name : `${s.xp} XP`}</div>
                  </button>
                );
              })}
            </div>
            {nextSkin ? (
              <div className="mt-2">
                <div className="h-2 bg-black/30 rounded-full overflow-hidden"><div className="h-full rounded-full bg-gradient-to-r from-amber-400 to-pink-500 transition-all" style={{ width: `${prog}%` }} /></div>
                <div className="text-white/60 text-[10px] mt-1 font-bold">Next: {nextSkin.f.idle} {nextSkin.name} at {nextSkin.xp} XP</div>
              </div>
            ) : <div className="text-amber-300 text-[10px] mt-2 font-black">🏆 Everything unlocked, legend!</div>}
            <div className="mt-2 bg-amber-400/15 border border-amber-300/30 rounded-xl p-2 text-center">
              <div className="text-amber-300 text-[11px] font-black">⚡ {curSkin.name}'s Power: {curSkin.perkName}</div>
              <div className="text-white/85 text-[10px] font-semibold">{curSkin.perkDesc}</div>
            </div>
          </div>
          <div className="grid gap-2 mb-4">
            <Opt active={mode === "showdown"} onClick={() => setMode("showdown")} emoji="🏆" title="Who Wins?" sub="Full board — call the winner." />
            <Opt active={mode === "equity"} onClick={() => setMode("equity")} emoji="🎯" title="Who's Favored?" sub="Half a board — spot the favorite." />
            <Opt active={mode === "range"} onClick={() => setMode("range")} emoji="🦈" title="Hand vs Range" sub="You vs a mystery range." />
          </div>
          {mode !== "range" && (
            <div className="grid grid-cols-3 gap-2 mb-3">
              {[2, 3, 4].map((n) => (
                <button key={n} onClick={() => { ping("click", muted); setPlayers(n); }}
                  className={`py-2.5 rounded-2xl border-2 font-black text-sm transition active:scale-95 ${players === n ? "bg-white border-white text-purple-900" : "bg-white/10 border-white/20 text-white"}`}>
                  {n === 2 ? "Heads Up" : `${n} Players`}
                </button>
              ))}
            </div>
          )}
          <div className="grid grid-cols-3 gap-2 mb-3">
            {Object.entries(DIFF).map(([d, info]) => (
              <button key={d} onClick={() => { ping("click", muted); setDiff(d); }}
                className={`py-2.5 rounded-2xl border-2 font-black transition active:scale-95 ${diff === d ? "bg-white border-white text-purple-900" : "bg-white/10 border-white/20 text-white"}`}>
                <div className="text-sm">{info.label}</div><div className="text-[10px] opacity-70">{info.m} pts</div>
              </button>
            ))}
          </div>
          <button onClick={() => { ping("click", muted); setBlitz((b) => !b); }}
            className={`w-full py-3 rounded-2xl border-2 text-sm font-black mb-4 transition active:scale-95 ${blitz ? "bg-amber-400 border-amber-300 text-amber-950" : "bg-white/10 border-white/20 text-white"}`}>
            ⚡ {blitz ? "BLITZ ON — 60-second sprint!" : "Blitz Mode: off"}
          </button>
          <button onClick={start} className="w-full py-4 rounded-2xl bg-gradient-to-r from-amber-400 to-pink-500 text-white font-black text-xl shadow-xl active:scale-95 transition hover:brightness-110">🎲 DEAL ME IN</button>
        </div>
      </div>
    );
  }

  if (screen === "over") {
    const rank = stats.score > 600 ? "🦈 Card Shark" : stats.score > 350 ? "🐂 Table Bull" : stats.score > 150 ? "🐣 Rising Rookie" : "🐠 Fish Food";
    return (
      <div className="min-h-[640px] w-full flex items-center justify-center p-4" style={BG}>
        <style>{STYLE}</style>
        <div className="relative bg-black/25 backdrop-blur rounded-3xl p-7 max-w-sm w-full border-2 border-white/15 shadow-2xl text-center overflow-hidden">
          {stats.correct > 0 && <Confetti />}
          <div className="text-5xl mb-1" style={{ animation: "pop 0.5s both" }}>⏰</div>
          <h2 className="text-3xl font-black text-white">TIME!</h2>
          <p className="text-pink-200 text-sm mb-4 font-semibold">{name} · {rank} · +{stats.score} XP</p>
          <div className="text-6xl font-black text-amber-300 mb-1" style={{ animation: "pop 0.5s 0.1s both" }}>{stats.score}</div>
          <div className="text-white/60 text-xs uppercase tracking-widest mb-5 font-bold">points this run</div>
          <div className="grid grid-cols-3 gap-2 mb-6 text-white">
            <div className="bg-white/10 rounded-2xl py-3"><div className="text-xl font-black">{stats.correct}/{stats.total}</div><div className="text-[10px] text-pink-200">nailed</div></div>
            <div className="bg-white/10 rounded-2xl py-3"><div className="text-xl font-black">{acc}%</div><div className="text-[10px] text-pink-200">accuracy</div></div>
            <div className="bg-white/10 rounded-2xl py-3"><div className="text-xl font-black">{stats.best}🔥</div><div className="text-[10px] text-pink-200">best run</div></div>
          </div>
          <button onClick={start} className="w-full py-3 rounded-2xl bg-gradient-to-r from-amber-400 to-pink-500 text-white font-black mb-2 active:scale-95 transition">🔁 Run It Back</button>
          <button onClick={() => { ping("click", muted); shareScore(); }} className="w-full py-3 rounded-2xl bg-white/15 border-2 border-white/25 text-white font-black mb-2 active:scale-95 transition">🔗 Share My Score</button>
          {note && <div className="mb-2"><span className="inline-block bg-emerald-400 text-emerald-950 text-xs font-black px-4 py-1.5 rounded-full" style={{ animation: "pop 0.3s both" }}>{note}</span></div>}
          <button onClick={() => setScreen("menu")} className="w-full py-2 text-white/70 text-sm hover:text-white font-semibold">← Menu (Lvl {lvl} · {xp} XP)</button>
        </div>
      </div>
    );
  }

  const lowTime = blitz && timeLeft <= 10;
  const Chip = ({ children, hot }) => (<span className={`flex items-center gap-1 px-3 py-1.5 rounded-full font-black text-sm ${hot ? "bg-rose-500 text-white animate-pulse" : "bg-black/30 text-white"}`}>{children}</span>);
  return (
    <div className="min-h-[640px] w-full p-3 sm:p-5 relative overflow-hidden" style={{ ...BG, animation: shake ? "shake 0.55s, bgshift 14s ease infinite" : "bgshift 14s ease infinite" }}>
      <style>{STYLE}</style>
      {popc > 0 && <Confetti key={popc} />}
      {floatPts && <div key={floatPts.k} className="absolute left-1/2 top-[32%] z-40 pointer-events-none text-4xl font-black" style={{ color: floatPts.color, animation: "floatup 1.1s ease-out forwards", textShadow: "0 2px 8px rgba(0,0,0,0.4)" }}>{floatPts.text}</div>}
      {unlock && (
        <div className="absolute left-1/2 top-16 z-50 pointer-events-none" style={{ animation: "toast 3.6s ease-out forwards" }}>
          <div className="bg-gradient-to-r from-amber-400 to-pink-500 text-white font-black px-5 py-3 rounded-2xl shadow-2xl text-center border-2 border-white/40">
            <div className="text-3xl">{unlock.f.idle}</div><div className="text-sm">NEW CHARACTER UNLOCKED!</div><div className="text-lg">{unlock.name}</div>
          </div>
        </div>
      )}
      <div className="flex items-center justify-between flex-wrap gap-2 mb-2 max-w-3xl mx-auto relative z-10">
        <div className="flex gap-1.5 flex-wrap">
          <Chip>🏆 {stats.score}</Chip><Chip>🎯 {acc}%</Chip>
          {blitz && <Chip hot={lowTime}>⏰ {timeLeft}s</Chip>}
        </div>
        <div className="flex gap-2">
          <button onClick={() => setMuted((m) => !m)} className="px-2.5 py-1.5 rounded-full bg-black/30 text-white text-sm active:scale-90 transition">{muted ? "🔇" : "🔊"}</button>
          <button onClick={() => setScreen("menu")} className="px-3 py-1.5 rounded-full bg-black/30 text-white text-xs font-bold active:scale-90 transition">↩ Menu</button>
        </div>
      </div>
      <div className="max-w-3xl mx-auto mb-2 relative z-10"><ComboMeter streak={stats.streak} /></div>
      <div className="flex items-center gap-2 max-w-3xl mx-auto mb-3 relative z-10">
        <Avatar skin={curSkin} mood={mood} name={name} />
        <div className="bg-white rounded-2xl rounded-bl-none px-4 py-2 shadow-lg font-bold text-purple-900 text-sm" style={{ animation: "pop 0.3s both" }}>{msg}</div>
        <span className="ml-auto shrink-0 bg-black/30 text-amber-200 text-[10px] font-black px-2.5 py-1 rounded-full whitespace-nowrap">⚡ {curSkin.perkName}</span>
      </div>
      <div className="max-w-3xl mx-auto relative z-10">
        <div className="text-center mb-2"><span className="text-white/70 text-xs uppercase tracking-widest font-black bg-black/20 px-3 py-1 rounded-full">🃏 Board · {round.mode === "showdown" ? "River" : round.street}</span></div>
        <div className="flex justify-center gap-1.5 sm:gap-2 mb-5 flex-wrap">
          {[0, 1, 2, 3, 4].map((i) => (round.board[i] ? <PlayingCard key={`${popc}-${i}`} c={round.board[i]} idx={i} anim /> : <EmptySlot key={i} />))}
        </div>
        {round.mode === "range"
          ? <RangeView round={round} revealed={revealed} pickv={pickv} correct={correct} submit={submit} pop={popc} />
          : <HandsView round={round} players={players} revealed={revealed} pickv={pickv} correct={correct} submit={submit} pop={popc} />}
        {revealed && (
          <div className="mt-5 text-center">
            {round.mode !== "range" && (
              <p className="text-white font-bold text-sm mb-3 bg-black/20 inline-block px-4 py-1.5 rounded-full">
                {round.winners.length > 1 ? `💸 Split: ${round.winners.map((i) => POS[i].split(" ")[0]).join(" & ")}` : `💰 ${POS[round.winners[0]].split(" ")[0]} ${round.mode === "showdown" ? "scoops it!" : "is the fave!"}`}
              </p>
            )}
            {!blitz
              ? <div><button onClick={nextRound} className="px-7 py-3.5 rounded-2xl bg-gradient-to-r from-amber-400 to-pink-500 text-white font-black text-lg shadow-xl active:scale-95 transition hover:brightness-110">Next Hand →</button></div>
              : <p className="text-white/70 text-xs font-bold animate-pulse">⚡ dealing next…</p>}
          </div>
        )}
      </div>
    </div>
  );
}

function HandsView({ round, players, revealed, pickv, correct, submit, pop }) {
  return (
    <React.Fragment>
      <p className="text-center text-white font-black mb-3 text-lg drop-shadow">{revealed ? (correct ? "🎉 NAILED IT!" : "💀 WHIFFED!") : round.mode === "showdown" ? "👉 Who wins the pot?" : "👉 Who's the favorite?"}</p>
      <div className={`grid gap-3 ${players === 2 ? "grid-cols-2" : players === 3 ? "grid-cols-3" : "grid-cols-2 sm:grid-cols-4"}`}>
        {round.hands.map((hand, i) => {
          const isW = round.winners.includes(i), isP = pickv === i;
          let cls = "bg-white/10 border-white/20";
          if (revealed) cls = isW ? "bg-emerald-400/30 border-emerald-300 ring-4 ring-emerald-300/50" : isP ? "bg-rose-500/30 border-rose-300 ring-4 ring-rose-300/50" : "bg-black/20 border-white/10 opacity-50";
          const sc = round.scores ? round.scores[i] : null, eq = round.equity ? round.equity[i] : null;
          return (
            <button key={i} disabled={revealed} onClick={() => submit(i)}
              className={`p-3 rounded-2xl border-2 transition ${cls} ${!revealed ? "hover:scale-105 hover:border-white active:scale-95 cursor-pointer" : ""}`}>
              <div className="flex items-center justify-between mb-2"><span className="text-white text-xs font-black">{POS[i]}</span>{revealed && isW && <span>✅</span>}{revealed && isP && !isW && <span>❌</span>}</div>
              <div className="flex justify-center gap-1.5">{hand.map((c, k) => <PlayingCard key={`${pop}-${k}`} c={c} small idx={k} anim />)}</div>
              {revealed && (<div className="mt-2">
                {sc && <div className="text-white text-[11px] font-black leading-tight">{describe(sc)}</div>}
                {eq != null && (<React.Fragment><div className="text-white text-sm font-black">{(eq * 100).toFixed(1)}%</div><div className="h-2 bg-black/30 rounded-full mt-1 overflow-hidden"><div className="h-full rounded-full" style={{ width: `${eq * 100}%`, background: isW ? "linear-gradient(90deg,#6ee7b7,#34d399)" : "#f472b6" }} /></div></React.Fragment>)}
              </div>)}
            </button>
          );
        })}
      </div>
    </React.Fragment>
  );
}

function RangeView({ round, revealed, pickv, correct, submit, pop }) {
  const heroMade = round.board.length >= 3 ? describe(evaluate7([...round.hero, ...round.board])) : null;
  const buckets = [{ id: "fav", label: "Favorite 💪", sub: ">56%" }, { id: "flip", label: "Coin Flip 🪙", sub: "44–56%" }, { id: "dog", label: "Underdog 🐶", sub: "<44%" }];
  return (
    <React.Fragment>
      <div className="flex items-center justify-center gap-4 sm:gap-6 mb-4">
        <div className="text-center">
          <div className="text-pink-200 text-[10px] uppercase tracking-widest font-black mb-1">Your Hand</div>
          <div className="flex gap-1.5">{round.hero.map((c, k) => <PlayingCard key={`${pop}-${k}`} c={c} idx={k} anim />)}</div>
          {heroMade && <div className="text-white text-[11px] mt-1 font-bold">{heroMade}</div>}
        </div>
        <div className="text-white font-black text-2xl drop-shadow">⚔️</div>
        <div className="text-center">
          <div className="text-pink-200 text-[10px] uppercase tracking-widest font-black mb-1">Mystery Range</div>
          <div className="flex gap-1.5"><CardBack /><CardBack /></div>
          <div className="text-amber-300 text-[11px] mt-1 font-black max-w-[120px]">{round.range}</div>
        </div>
      </div>
      <p className="text-center text-white font-black mb-3 text-lg drop-shadow">{revealed ? (correct ? "🎉 NAILED IT!" : "💀 WHIFFED!") : "👉 How do you stack up?"}</p>
      <div className="grid grid-cols-3 gap-2">
        {buckets.map((b) => {
          const isW = round.bucket === b.id, isP = pickv === b.id;
          let cls = "bg-white/10 border-white/20";
          if (revealed) cls = isW ? "bg-emerald-400/30 border-emerald-300 ring-4 ring-emerald-300/50" : isP ? "bg-rose-500/30 border-rose-300 ring-4 ring-rose-300/50" : "bg-black/20 border-white/10 opacity-50";
          return (
            <button key={b.id} disabled={revealed} onClick={() => submit(b.id)}
              className={`p-3 rounded-2xl border-2 text-center transition ${cls} ${!revealed ? "hover:scale-105 hover:border-white active:scale-95 cursor-pointer" : ""}`}>
              <div className="text-white font-black text-sm">{b.label}</div><div className="text-pink-200 text-[10px] font-bold">{b.sub}</div>
            </button>
          );
        })}
      </div>
      {revealed && (
        <div className="mt-4 text-center">
          <div className="text-pink-200 text-sm font-bold">Your equity vs <span className="text-amber-300">{round.range}</span></div>
          <div className="text-4xl font-black text-white drop-shadow" style={{ animation: "pop 0.4s both" }}>{(round.equity * 100).toFixed(1)}%</div>
          <div className="h-3 bg-black/30 rounded-full mt-2 max-w-xs mx-auto overflow-hidden"><div className="h-full rounded-full" style={{ width: `${round.equity * 100}%`, background: "linear-gradient(90deg,#fbbf24,#f472b6)" }} /></div>
        </div>
      )}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
